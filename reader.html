<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>RSVP Reader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=1783010000">
</head>
<body class="reader-page">
<header class="top reader-top">
  <div class="reader-id">
    <span class="ri-title" id="bookTitle">Loading…</span>
    <span class="ri-sep">·</span>
    <span class="ri-chapter" id="chapterName"></span>
    <span class="ri-author" id="bookAuthor"></span>
  </div>
  <div class="top-actions">
    <button id="settingsBtn" class="icon-btn ghost" aria-label="Settings" aria-haspopup="true">⚙</button>
  </div>
</header>

<!-- Settings menu -->
<div class="menu-backdrop" id="settingsMenu" hidden>
  <div class="menu" role="menu">
    <a class="menu-item" href="index.html?home" role="menuitem">← Library</a>
    <div class="menu-sep"></div>
    <div class="menu-label">Mode</div>
    <button class="menu-item" id="mRead" role="menuitemradio" aria-checked="true">Read (paged)</button>
    <button class="menu-item" id="mRsvp" role="menuitemradio" aria-checked="false">Speed-read</button>
    <button class="menu-item" id="mPane" role="menuitem" hidden>Hide reading pane</button>
    <div class="menu-sep"></div>
    <div class="menu-label">Text size</div>
    <div class="menu-segmented" role="radiogroup" aria-label="Text size">
      <button class="seg-btn" id="mFontSmall" role="radio" aria-checked="true" data-size="small">Small</button>
      <button class="seg-btn" id="mFontMedium" role="radio" aria-checked="false" data-size="medium">Medium</button>
      <button class="seg-btn" id="mFontLarge" role="radio" aria-checked="false" data-size="large">Large</button>
    </div>
    <div class="menu-sep"></div>
    <div class="menu-label">Chapter</div>
    <select id="chapterSel" class="menu-select" aria-label="Jump to chapter"></select>
    <div class="menu-sep"></div>
    <button class="menu-item" id="mTheme" role="menuitem">Toggle light / dark</button>
  </div>
</div>

<main class="wrap">
  <!-- Paged reader -->
  <section id="pagedView" aria-label="Paged reader">
    <div class="page-frame">
      <button class="page-edge left" id="pagePrev" aria-label="Previous page"><span class="chev">‹</span></button>
      <div class="page" id="page"></div>
      <button class="page-edge right" id="pageNext" aria-label="Next page"><span class="chev">›</span></button>
    </div>
    <div class="page-meta">
      <span id="pageNum">page — of —</span>
      <span class="hint">tap a word to speed-read</span>
      <span id="sessionWpm" class="session-wpm" title="Your reading pace this session (resets when you reopen the site). Slow reading always counts; a page left far too long is treated as away and shows --.">-- wpm</span>
    </div>
  </section>

  <!-- RSVP reader -->
  <section id="rsvpView" hidden aria-label="Speed reader">
  <button id="paneToggle" class="pane-toggle" aria-label="Hide or show reading pane">▲ hide text</button>
  <div class="rail" id="rail" aria-live="off">
    <div class="guide"></div>
    <div class="idle" id="railIdle">Press play to begin reading.</div>
    <div class="word" id="word" hidden></div>
  </div>

  <div class="controls">
    <div class="scrub">
      <input id="scrub" type="range" min="0" max="100" value="0" step="1" aria-label="Position in book">
    </div>
    <div class="progress" id="progress">word 0 of 0</div>
    <div class="readout">
      <span id="pct">0%</span>
      <span id="timeleft">time left —:—</span>
    </div>

    <div class="transport">
      <button id="back30" title="Back 30 seconds">⟲ 30s</button>
      <button id="back1" title="Back one word">‹</button>
      <button id="play" class="primary" style="min-width:120px">Play</button>
      <button id="fwd1" title="Forward one word">›</button>
      <button id="fwd30" title="Forward 30 seconds">30s ⟳</button>
    </div>

    <div class="row" style="justify-content:center">
      <label for="wpm">Speed</label>
      <input id="wpm" type="range" min="150" max="900" step="10" value="400" style="flex:1; accent-color:var(--rubric)" aria-label="Words per minute">
      <span class="wpm-val" id="wpmVal" tabindex="0" role="button" title="Click to type an exact speed">400 wpm</span>
      <input id="wpmInput" type="text" inputmode="numeric" class="wpm-edit" hidden aria-label="Type words per minute">
    </div>
  </div>
  </section>
  <!-- Tap prompt overlay (shown when tapping a reading area) -->
  <div class="tap-prompt" id="tapPrompt" hidden>
    <div class="tap-prompt-inner">
      <p id="tapPromptMsg">Tap a word to set your start point, or keep reading.</p>
      <div class="tap-prompt-actions">
        <button id="tpSetWord" class="primary">Set start word</button>
        <button id="tpExpand">Expand to reading</button>
        <button id="tpCancel" class="ghost">Cancel</button>
      </div>
    </div>
  </div>
</main>

<script src="js/parser.js?v=1782920000"></script>
<script src="js/storage.js?v=1782970000"></script>
<script src="js/rsvp.js?v=1782920000"></script>
<script src="js/coords.js?v=1782920000"></script>
<script src="js/paged.js?v=1783010000"></script>
<script src="js/reader.js?v=1783020000"></script>

<!-- Screen Wake Lock: keeps the phone awake during speed-reading -->
<script>
(function () {
  if (!('wakeLock' in navigator)) return; // unsupported (older browsers / non-HTTPS)

  let wakeLock = null;
  let wantLock = false; // tracks whether we *should* be holding a lock

  async function acquire() {
    wantLock = true;
    if (wakeLock) return;
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    } catch (e) {
      // Request can reject if the page isn't visible or is denied; ignore.
      wakeLock = null;
    }
  }

  async function release() {
    wantLock = false;
    if (wakeLock) {
      try { await wakeLock.release(); } catch (e) {}
      wakeLock = null;
    }
  }

  // The OS auto-releases the lock when the tab is hidden. Re-acquire on return
  // if we were meant to be holding it.
  document.addEventListener('visibilitychange', () => {
    if (wantLock && document.visibilityState === 'visible') acquire();
  });

  // Hook into the existing Play/Pause button. The button's label flips between
  // "Play" and "Pause", so read its text to decide which way it's going.
  const playBtn = document.getElementById('play');
  if (playBtn) {
    playBtn.addEventListener('click', () => {
      // Defer one tick so we read the label *after* rsvp.js updates it.
      setTimeout(() => {
        const label = (playBtn.textContent || '').trim().toLowerCase();
        if (label.startsWith('pause') || label.startsWith('stop')) {
          acquire();
        } else {
          release();
        }
      }, 0);
    });
  }

  // Safety net: drop the lock when leaving the page.
  window.addEventListener('pagehide', release);
})();
</script>
</body>
</html>
